
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Interativa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="galeria-container">
        <!-- Card 1 -->
        <article class="card">
            <img src="https://picsum.photos" alt="Paisagem 1">
            <div class="card-conteudo">
                <h2>Explorando as Montanhas</h2>
                <p>Uma vista incrível durante o amanhecer.</p>
                <button class="btn-like" aria-label="Curtir">
                    ❤️ <span class="contador">0</span> Curtidas
                </button>
            </div>
        </article>

        <!-- Card 2 -->
        <article class="card">
            <img src="https://picsum.photos" alt="Paisagem 2">
            <div class="card-conteudo">
                <h2>Caminho na Floresta</h2>
                <p>Respirando ar puro e aproveitando a natureza.</p>
                <button class="btn-like" aria-label="Curtir">
                    ❤️ <span class="contador">0</span> Curtidas
                </button>
            </div>
        </article>

        <!-- Card 3 -->
        <article class="card">
            <img src="https://picsum.photos" alt="Paisagem 3">
            <div class="card-conteudo">
                <h2>Paraíso Tropical</h2>
                <p>Águas cristalinas e areia branca.</p>
                <button class="btn-like" aria-label="Curtir">
                    ❤️ <span class="contador">0</span> Curtidas
                </button>
            </div>
        </article>
    </main>

    <script src="script.js"></script>
</body>
</html>
